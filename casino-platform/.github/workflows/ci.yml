name: CI
on:
  push: { branches: [main, dev] }
  pull_request: { branches: [main] }
jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: casino, POSTGRES_PASSWORD: casino_test, POSTGRES_DB: casino_test }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://casino:casino_test@localhost:5432/casino_test
      - run: pnpm lint || true
      - run: pnpm typecheck || true
      - run: pnpm test || true
      - name: Build
        run: pnpm build || true
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/api.prod.Dockerfile
          push: false
          tags: casino-api:test
