version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino_dev_password
      POSTGRES_DB: casino_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U casino"], interval: 5s, retries: 10 }

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass casino_dev_password
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD","redis-cli","-a","casino_dev_password","ping"], interval: 5s, retries: 10 }

  api:
    build: { context: ., dockerfile: infra/docker/api.Dockerfile }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    env_file: [.env]
    ports: ["3001:3001"]
    volumes: ["./uploads:/app/uploads"]
    restart: unless-stopped

  web:
    build: { context: ., dockerfile: infra/docker/web.Dockerfile }
    depends_on: [api]
    env_file: [.env]
    ports: ["3000:3000"]
    restart: unless-stopped

  admin:
    build: { context: ., dockerfile: infra/docker/admin.Dockerfile }
    depends_on: [api]
    env_file: [.env]
    ports: ["3002:3002"]
    restart: unless-stopped

volumes: { pgdata: {} }
