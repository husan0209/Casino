version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/scripts/postgres-backup.sh:/docker-entrypoint-initdb.d/backup.sh:ro
    restart: unless-stopped
    networks: [casino]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U ${DB_USER:-casino}"], interval: 10s, retries: 5 }

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redisdata:/data]
    restart: unless-stopped
    networks: [casino]
    healthcheck: { test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"], interval: 10s, retries: 5 }

  api:
    build:
      context: .
      dockerfile: infra/docker/api.prod.Dockerfile
    env_file: [.env.production]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [casino]
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: infra/docker/web.prod.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://casino.example.com/api/v1
    env_file: [.env.production]
    depends_on: [api]
    restart: unless-stopped
    networks: [casino]

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.prod.Dockerfile
    env_file: [.env.production]
    depends_on: [api]
    restart: unless-stopped
    networks: [casino]

  nginx:
    image: nginx:alpine
    depends_on: [api, web, admin]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./uploads:/var/www/uploads:ro
    restart: unless-stopped
    networks: [casino]

volumes:
  pgdata:
  redisdata:
  certbot_certs:
  certbot_www:

networks:
  casino:
    driver: bridge
