user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 2048; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format main_json escape=json
    '{ "time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"rt":$request_time,'
    '"ua":"$http_user_agent","ref":"$http_referer","request_id":"$http_x_request_id" }';
  access_log /var/log/nginx/access.log main_json;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 10m;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
  # rate limit zones
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/m;
  include /etc/nginx/conf.d/*.conf;
}
