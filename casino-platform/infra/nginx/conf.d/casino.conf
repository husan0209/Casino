# HTTP -> HTTPS redirect
server {
  listen 80;
  server_name casino.example.com admin.casino.example.com;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
# --- casino.example.com (web) ---
server {
  listen 443 ssl http2;
  server_name casino.example.com;
  ssl_certificate /etc/letsencrypt/live/casino.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/casino.example.com/privkey.pem;
  include /etc/nginx/snippets/ssl.conf;

  # security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "0" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://casino.example.com; frame-ancestors 'self';" always;

  # /api -> api:3001
  location /api/ {
    limit_req zone=api_general burst=20 nodelay;
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
  }
  # auth rate limit
  location ~ ^/api/v1/auth/(login|register|forgot-password) {
    limit_req zone=api_auth burst=5 nodelay;
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
  # webhooks
  location ~ ^/api/v1/(payments/webhooks|provider-callback) {
    limit_req zone=webhooks burst=50 nodelay;
    client_max_body_size 2m;
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  # uploads (kyc - protected via api, avatars - public)
  location /uploads/avatars/ {
    alias /var/www/uploads/avatars/;
    expires 30d; add_header Cache-Control "public";
  }
  # Next.js web
  location / {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
# --- admin.casino.example.com ---
server {
  listen 443 ssl http2;
  server_name admin.casino.example.com;
  ssl_certificate /etc/letsencrypt/live/admin.casino.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.casino.example.com/privkey.pem;
  include /etc/nginx/snippets/ssl.conf;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # IP whitelist (optional – uncomment)
  # allow 1.2.3.4; deny all;
  location / {
    proxy_pass http://admin:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
