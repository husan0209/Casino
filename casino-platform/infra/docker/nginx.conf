upstream api_upstream { server api:3001; }
upstream web_upstream { server web:3000; }
upstream admin_upstream { server admin:3002; }
server {
  listen 80;
  server_name casino.local admin.casino.local;
  location /api/ { proxy_pass http://api_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
  location / { 
    set $backend web_upstream;
    if ($host ~* "^admin\.") { set $backend admin_upstream; }
    proxy_pass http://$backend;
    proxy_set_header Host $host;
  }
}
